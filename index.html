<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UWISpots</title>
    <style>
    
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;

        #navbar {
            background-color: #333;
            overflow: hidden; 
            display: flex;
            flex-direction: row;
        }

        #navbar a {
            /* float: right; */

            padding: 14px 16px;

        #navbar a:hover {
            background-color: #ddd;
            color: black;
        }   



    </style>
</head>
<body>
    <nav id="navbar">
        <a href="#home">Home</a>
