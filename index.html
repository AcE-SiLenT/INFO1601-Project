<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <title>UWISpots</title>
    <style>
    
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        header{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            background-color: #2b6fc3;
            height: 10vh;
  
        }

        header img{
            height: 100%;
            margin-left: 10px;
            padding: 5px;
            background-color: transparent;
        }

        header p{
            font-size: x-large;
            font-weight: bold;
            color: black;
        }

        #navbar {
            overflow: hidden; 
            display: flex;
            flex-direction: row;
            margin-right: 10px;
        }

        #navbar a {
           
            color: black;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
            transition: ease-in-out 0.25s;

        }

        #navbar a:hover {
            background-color: #ddd;
            color: black;
            border-radius: 16px;
        }   

        main{
            display: flex;
            flex-direction: row;
            height: 90vh;

        }

        button{
          height: 40px;
          width: 40px;
          background-color: white;
          border: 2px;
          border-radius: 50%;
          cursor: pointer;
        }

        button i{
            height: 110%;
            width: 110%;
            font-size: x-large;
            /* padding: 10px 20px; */
            cursor: pointer;
        }

        aside {
            background-color: #f4f4f4;
            padding: 5px;
            width: 200px;
            /* float: left; */
            height: 100%;
            margin: 0;
            /* flex-grow: 1; */
            width: 10%;
            display: flex;
            flex-direction: column;
        }   

        aside ul {
            list-style-type: none;
            padding: 0;
            justify-content: center;
           
        }

        aside li  {
            color: #333;
            text-decoration: none;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
             /* gap: 10px; */
             
        }

        #map {
             height: 100%;
             flex-grow: 18;
        }

        #detail {
            background-color: #f4f4f4;
            padding: 20px;
            width: 200px;
            height: 100%;
            margin: 0;
            /* float: right; */
            flex-grow: 2;
            width: 10%;
        }
        
        


    </style>

     <script
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBePCulO6qyVfJMY5M5bYUJxBH-PvvJrMY&libraries=maps,marker"
      defer> 
    </script>

</head>
<body>

    <header>

        <img src="/icon/Logo.png" alt="">

        <p>UwiSpots</p>

        <nav id="navbar">
            <a href="#home"><i class="bi bi-house"></i> Home</a>
            <a href="#map"><i class="bi bi-map"></i> Map</a>
            <a href="#about"><i class="bi bi-info-circle"></i> About</a>
            <a href="#login"> Login</a>
        </nav>

    </header>
    
    <main>
        <aside id="master">
            
            <button> <i class="bi bi-list"></i></button>
            
            <ul>
                <li><i class="bi bi-bookmark"></i>Favorites</li>
                <li>Cafeteria</li>
                <li>Study Spots</li>
                <li>Events</li>
            </ul>
        </aside>

        <div id="map">
            <gmp-map center="10.641919556440756, -61.39944669632869" zoom="18" map-id="DEMO_MAP_ID" ></gmp-map>
        </div>

        <div id="detail">
                <h2>Location Details</h2>
                <p id="location-name">Select a location on the map to see details here.</p>
        </div>

    </main>

</html>
